<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cc00ff"/><stop offset="0.5" stop-color="#ff4400"/><stop offset="1" stop-color="#ffcc00"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 -0.3; 0 0.3; 0 -0.3" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .card{fill:#070011} .yr{fill:#ffcc00} .org{fill:#ff7a3c} .role{fill:#bfe6ff} .hd{fill:#ff4400}
      @media (prefers-color-scheme: light){ .card{fill:#fff6ec} .yr{fill:#b87400} .org{fill:#c23a00} .role{fill:#1a5e7a} .hd{fill:#c23a00} }
    </style>
  </defs>

  <rect width="1000" height="540" rx="14" class="card"/>
  <text x="170" y="38" font-size="20" font-weight="900" letter-spacing="3" class="hd" filter="url(#glow)">⚔ FORGE OF TRIALS — EXPERIENCE</text>

  <rect x="148.5" y="60" width="3" height="448" rx="1.5" fill="url(#line)" filter="url(#glow)"/>
  <circle r="5" cx="150" fill="#ffcc00" filter="url(#glow)"><animate attributeName="cy" values="60;508;60" dur="6.5s" repeatCount="indefinite"/></circle>

