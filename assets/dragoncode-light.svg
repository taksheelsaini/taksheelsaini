    <text x="28" y="280"><tspan class="def">    databases  = [</tspan><tspan class="st">"PostgreSQL"</tspan><tspan class="def">, </tspan><tspan class="st">"ChromaDB"</tspan><tspan class="def">, </tspan><tspan class="st">"Qdrant"</tspan><tspan class="def">, </tspan><tspan class="st">"SQLite"</tspan><tspan class="def">]</tspan></text>
