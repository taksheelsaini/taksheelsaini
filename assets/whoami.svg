<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="1000" height="340" font-family="'Trebuchet MS', 'Segoe UI', Verdana, sans-serif">
  <defs>
    <linearGradient id="wfire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cc00ff"><animate attributeName="stop-color" values="#cc00ff;#ff4400;#ffcc00;#cc00ff" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="1" stop-color="#ffcc00"><animate attributeName="stop-color" values="#ffcc00;#cc00ff;#ff4400;#ffcc00" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <filter id="wglow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .card { fill:#0a0014; }
      .head { fill:#ffe9c2; }
      .body { fill:#e9ddff; }
      .accent { fill:#ff8a4c; }
      .cyan { fill:#7fd4ff; }
    </style>
  </defs>

  <rect x="2" y="2" width="996" height="336" rx="16" class="card"/>
  <rect x="6" y="6" width="988" height="328" rx="13" fill="none" stroke="url(#wfire)" stroke-width="2" filter="url(#wglow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- embers -->
  <circle cx="36" cy="300" r="3.5" fill="url(#wfire)"><animate attributeName="cy" values="305;-10" dur="8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="8s" repeatCount="indefinite"/></circle>
  <circle cx="965" cy="300" r="3" fill="url(#wfire)"><animate attributeName="cy" values="305;-10" dur="9.5s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="9.5s" begin="2s" repeatCount="indefinite"/></circle>

  <text x="46" y="62" font-size="30" font-weight="900" letter-spacing="2" fill="url(#wfire)" filter="url(#wglow)">🐉 WHO AM I</text>
  <text x="46" y="92" font-size="15" font-weight="700" class="accent">AI / ML Engineer · Privacy-First Systems Builder · Published Researcher</text>

  <g font-size="16.5">
    <text x="46" y="140" class="body">⚡ I build practical, on-device solutions with <tspan class="accent" font-weight="700">Python</tspan> and applied <tspan class="accent" font-weight="700">AI / ML</tspan> — privacy-first by default.
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/></text>
    <text x="46" y="176" class="body">🏢 Expanding into enterprise tech — learning <tspan class="cyan" font-weight="700">SAP SuccessFactors</tspan> &amp; <tspan class="cyan" font-weight="700">S/4HANA</tspan>.
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="0.7s" repeatCount="indefinite"/></text>
    <text x="46" y="212" class="body">🧪 Every week I sharpen my craft — new libraries, cleaner fundamentals, small hands-on builds.
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="1.4s" repeatCount="indefinite"/></text>
    <text x="46" y="248" class="body">🍳 Off the keyboard, I recharge on Sundays by cooking my favourite meals.
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="2.1s" repeatCount="indefinite"/></text>
    <text x="46" y="284" class="body">🚀 Open to <tspan class="accent" font-weight="700">AI/ML · Cybersecurity · Software Development · tech-driven business</tspan> roles.
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="2.8s" repeatCount="indefinite"/></text>
  </g>

  <text x="46" y="318" font-size="13.5" font-weight="700" class="cyan">BCA + MCA Dual Degree · First Division with Distinction · 7 internships · 11 systems · 38+ certifications</text>
</svg>
