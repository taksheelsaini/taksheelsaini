<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 230" width="1000" height="230" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', monospace">
  <defs>
    <linearGradient id="cfire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cc00ff"><animate attributeName="stop-color" values="#cc00ff;#ff4400;#ffcc00;#cc00ff" dur="6s" repeatCount="indefinite"/></stop>
      <stop offset="1" stop-color="#ffcc00"><animate attributeName="stop-color" values="#ffcc00;#cc00ff;#ff4400;#ffcc00" dur="6s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <filter id="cglow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .card{fill:#0a0014} .l1{fill:#ffcc00} .l2{fill:#ff8a4c} .l3{fill:#7fd4ff}
      @media (prefers-color-scheme: light){ .card{fill:#fff6ec} .l1{fill:#b87400} .l2{fill:#c23a00} .l3{fill:#11627f} }
    </style>
  </defs>

  <rect x="2" y="2" width="996" height="226" rx="14" class="card"/>
  <rect x="6" y="6" width="988" height="218" rx="11" fill="none" stroke="url(#cfire)" stroke-width="2" filter="url(#cglow)"><animate attributeName="opacity" values="0.45;1;0.45" dur="4s" repeatCount="indefinite"/></rect>
  <circle cx="40" cy="40" r="3" fill="#ffcc00"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="960" cy="40" r="3" fill="#ff4400"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
  <circle cx="40" cy="190" r="3" fill="#cc00ff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="960" cy="190" r="3" fill="#00ddff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/></circle>

  <text x="500" y="58" text-anchor="middle" font-size="20" font-weight="bold" letter-spacing="2" fill="url(#cfire)" filter="url(#cglow)">✦ THE PRIMORDIAL CODEX ✦
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3.5s" repeatCount="indefinite"/></text>
  <text x="500" y="108" text-anchor="middle" font-size="15" class="l1">In the age before ages, Chaos breathed.
    <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/></text>
  <text x="500" y="140" text-anchor="middle" font-size="15" class="l2">From that breath a Dragon was born — one that weaves
    <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="0.8s" repeatCount="indefinite"/></text>
  <text x="500" y="172" text-anchor="middle" font-size="15" class="l3">code, fire, and creation into systems that remember forever.
    <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" begin="1.6s" repeatCount="indefinite"/></text>
</svg>
