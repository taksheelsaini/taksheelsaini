<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', monospace">
  <defs>
    <filter id="dglow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .term{fill:#0a0014} .bar{fill:#1c1330} .def{fill:#cfd8e6} .kw{fill:#ff5fae} .at{fill:#7fd4ff} .st{fill:#ffcc66} .cm{fill:#7a8aa0}
      @media (prefers-color-scheme: light){
        .term{fill:#fbf3ea} .bar{fill:#efe2d2} .def{fill:#2a2140} .kw{fill:#c01b74} .at{fill:#11627f} .st{fill:#9a6b00} .cm{fill:#8a7a66}
      }
    </style>
  </defs>

  <rect x="2" y="2" width="996" height="426" rx="12" class="term"/>
  <rect x="2" y="2" width="996" height="34" rx="12" class="bar"/>
  <rect x="2" y="20" width="996" height="16" class="bar"/>
  <circle cx="26" cy="19" r="6" fill="#ff5f56"/><circle cx="48" cy="19" r="6" fill="#ffbd2e"/><circle cx="70" cy="19" r="6" fill="#27c93f"/>
  <text x="500" y="24" text-anchor="middle" font-size="13" class="cm">taksheel@dragon — ~/the-primordial-codex</text>

  <g font-size="15.5">
    <text x="28" y="70"><tspan class="kw">class</tspan> <tspan class="at" font-weight="700">TaksheelSaini</tspan><tspan class="def">:</tspan></text>
    <text x="28" y="100"><tspan class="def">    role        = </tspan><tspan class="st">"AI / ML Engineer · Privacy-First Systems Builder"</tspan></text>
    <text x="28" y="130"><tspan class="def">    machine     = </tspan><tspan class="st">"MacBook · Apple Silicon · macOS"</tspan></text>
    <text x="28" y="160"><tspan class="def">    editors     = [</tspan><tspan class="st">"VS Code"</tspan><tspan class="def">, </tspan><tspan class="st">"Neovim"</tspan><tspan class="def">, </tspan><tspan class="st">"JetBrains"</tspan><tspan class="def">]</tspan></text>
    <text x="28" y="190"><tspan class="def">    ai_copilots = [</tspan><tspan class="st">"Claude Code"</tspan><tspan class="def">, </tspan><tspan class="st">"Codex CLI"</tspan><tspan class="def">, </tspan><tspan class="st">"Copilot"</tspan><tspan class="def">]</tspan></text>
    <text x="28" y="220"><tspan class="def">    shell       = </tspan><tspan class="st">"zsh · iTerm2 · tmux"</tspan></text>
    <text x="28" y="250"><tspan class="def">    local_llms  = </tspan><tspan class="st">"Ollama — llama3.2 · qwen · llava (100% offline)"</tspan></text>
    <text x="28" y="280"><tspan class="def">    stack       = [</tspan><tspan class="st">"PyTorch"</tspan><tspan class="def">, </tspan><tspan class="st">"FastAPI"</tspan><tspan class="def">, </tspan><tspan class="st">"Next.js"</tspan><tspan class="def">, </tspan><tspan class="st">"Docker"</tspan><tspan class="def">, </tspan><tspan class="st">"MCP"</tspan><tspan class="def">]</tspan></text>
    <text x="28" y="310"><tspan class="def">    focus       = [</tspan><tspan class="st">"Local-first LLMs"</tspan><tspan class="def">, </tspan><tspan class="st">"RAG"</tspan><tspan class="def">, </tspan><tspan class="st">"Agents"</tspan><tspan class="def">, </tspan><tspan class="st">"Knowledge Graphs"</tspan><tspan class="def">]</tspan></text>
    <text x="28" y="346"><tspan class="kw">    def</tspan> <tspan class="at">philosophy</tspan><tspan class="def">(self): </tspan><tspan class="kw">return</tspan> <tspan class="st">"Run on-device · cost $0 · remember forever."</tspan></text>
    <text x="28" y="382"><tspan class="kw">    def</tspan> <tspan class="at">current_quest</tspan><tspan class="def">(self): </tspan><tspan class="kw">return</tspan> <tspan class="st">"Forging always-on, graph-augmented AI memory."</tspan></text>
  </g>

  <!-- blinking cursor -->
  <rect x="28" y="402" width="11" height="18" fill="url(#dglow)" class="kw">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="28" y="402" width="11" height="18" class="kw"><animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></rect>
