<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 30" width="1200" height="30">
  <defs>
    <!-- fades to TRANSPARENT at both ends → renders cleanly on light AND dark backgrounds -->
    <linearGradient id="d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#cc00ff" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#cc00ff" stop-opacity="1"/>
      <stop offset="0.5"  stop-color="#ff4400" stop-opacity="1"/>
      <stop offset="0.78" stop-color="#ffcc00" stop-opacity="1"/>
      <stop offset="1"    stop-color="#ffcc00" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
                        values="-0.6 0; 0.6 0; -0.6 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- glowing line -->
  <rect x="0" y="13.5" width="1200" height="3" rx="1.5" fill="url(#d)" filter="url(#g)"/>
  <rect x="0" y="13.5" width="1200" height="3" rx="1.5" fill="url(#d)"/>

  <!-- travelling spark -->
  <circle r="5" cy="15" fill="#ffcc00" filter="url(#g)">
    <animate attributeName="cx" values="60;1140;60" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- chaos diamond -->
  <rect x="592" y="8" width="16" height="16" transform="rotate(45 600 16)" fill="#cc00ff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
